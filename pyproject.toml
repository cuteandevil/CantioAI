[build-system]\nrequires = ["setuptools>=61.0"]\n\n[project]\nname = \"CantioAI\"\nversion = \"0.1.0\"\ndescription = \"Hybrid Source-Filter + Neural Vocoder Voice Conversion System\"\nauthors = [\n    {name = \"Eval.ai\", email = \"3391403137@qq.com\"}\n]\nreadme = \"README.md\"\nlicense = {text = \"MIT\"}\nrequires-python = \">=3.8\"\nclassifiers = [\n    \"Development Status :: 3 - Alpha\",\n    \"Intended Audience :: Science/Research\",\n    \"License :: OSI Approved :: Apache 2.0 License\",\n    \"Operating System :: OS Independent\",\n    \"Programming Language :: Python :: 3\",\n    \"Programming Language :: Python :: 3.8\",\n    \"Programming Language :: Python :: 3.9\",\n    \"Programming Language :: Python :: 3.10\",\n    \"Topic :: Multimedia :: Sound/Audio :: Speech\",\n    \"Topic :: Scientific/Engineering :: Artificial Intelligence\",\n]\n\n[tool.setuptools]\npackage-find = {where = [\"src\", \"src.*\"]}\n\n[tool.setuptools.packages.find]\nwhere = [\"src\", \"src.*\"]\n\n[project.urls]\nHomepage = \"https://github.com/cuteandevil/cantioai\"\n\n[project.scripts]\ntrain = \"scripts/train.py\"\ninfer = \"scripts/infer.py\"\nevaluate = \"scripts/evaluate.py\"\npreprocess = \"scripts/preprocess.py\"\n\n[project.gui-scripts]\n# No GUI scripts currently\n\n