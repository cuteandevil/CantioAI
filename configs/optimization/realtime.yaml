# configs/optimization/realtime.yaml
realtime:
  enabled: true
  target_latency: 30.0  # 目标延迟（毫秒）
  target_device: "auto"  # auto, cpu, cuda, tpu, npu

  # 优化级别
  optimization_level: "balanced"  # minimal, balanced, aggressive, extreme

  # 模型级优化
  model_optimization:
    quantization:
      enabled: true
      dtype: "int8"  # float16, bfloat16, int8
      per_channel: true
      calibration_samples: 100

    pruning:
      enabled: false
      method: "structured"  # structured, unstructured
      sparsity: 0.3
      iterative: true

    distillation:
      enabled: false
      teacher_checkpoint: null
      temperature: 3.0

    operator_fusion:
      enabled: true
      fuse_conv_bn: true
      fuse_attention: true

  # 运行时优化
  runtime_optimization:
    jit_compilation: true
    graph_optimization: true
    memory_pool: true
    dynamic_batching: true
    cache_system: true

  # 算法级优化
  algorithmic_optimization:
    approximation:
      low_rank: false
      sparse_attention: true
      flash_attention: true

    adaptive_computation:
      early_exit: false
      dynamic_depth: false
      conditional_computation: true

    streaming:
      enabled: true
      chunk_size: 512
      overlap: 128
      causal: true

  # 硬件级优化
  hardware_optimization:
    cpu:
      simd: true
      threads: 0  # 0表示自动
      memory_alignment: 64

    gpu:
      tensorrt: true
      fp16: true
      stream_concurrency: 2

    edge:
      tflite: false
      coreml: false
      onnx_runtime: true

  # 性能监控
  monitoring:
    latency_tracking: true
    memory_tracking: true
    throughput_tracking: true
    auto_tuning: false